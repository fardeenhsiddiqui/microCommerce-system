# Postgres SQL database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/product-service
spring.datasource.username= postgres
spring.datasource.password= root
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.application.name=ProductService

# Rabbit MQ Config
spring.rabbitmq.host= localhost
spring.rabbitmq.port = 5672
spring.rabbitmq.username = guest
spring.rabbitmq.password = guest
logging.level.org.springframework.amqp=DEBUG

# ElasticSearch
spring.elasticsearch.uris=http://localhost:9200
#spring.data.elasticsearch.uris = http://localhost:9200
spring.data.elasticsearch.repositories.enabled=false
#spring.elasticsearch.client.reactive = true
# Turn search OFF
product.search.enabled=false

#AWS S3
cloud.aws.region.static=ap-south-1
aws.s3.bucket=e-com-imagestore
